<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RunCircle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="map-pane" aria-label="주변 러너 지도">
      <header class="topbar">
        <div>
          <p class="eyebrow">RunCircle</p>
          <h1>내 주변 러너</h1>
        </div>
        <button class="icon-button" id="locateButton" type="button" aria-label="현재 위치 확인" title="현재 위치 확인">
          <span aria-hidden="true">◎</span>
        </button>
      </header>

      <div class="radius-control" role="group" aria-label="경쟁 반경 선택">
        <button class="radius-option is-active" type="button" data-radius="1">1 km</button>
        <button class="radius-option" type="button" data-radius="3">3 km</button>
        <button class="radius-option" type="button" data-radius="5">5 km</button>
      </div>

      <div class="map-stage" id="mapStage">
        <div class="map-canvas" id="mapCanvas" aria-label="Mapbox 지도"></div>
        <div class="map-fallback" id="mapFallback">
          <div>
            <p class="eyebrow">Mapbox</p>
            <h2>Access Token을 입력하면 실제 지도가 표시됩니다</h2>
            <p>확대/축소, 내 위치 이동, 반경 원, 러너 핀과 정보창이 활성화됩니다.</p>
          </div>
          <form class="api-key-form" id="apiKeyForm">
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Mapbox public access token">
            <button class="text-button" type="submit">적용</button>
          </form>
        </div>
        <div class="map-tools" aria-label="지도 도구">
          <button class="map-tool" id="zoomInButton" type="button" aria-label="지도 확대" title="지도 확대">+</button>
          <button class="map-tool" id="zoomOutButton" type="button" aria-label="지도 축소" title="지도 축소">−</button>
          <button class="map-tool" id="fitButton" type="button" aria-label="반경에 맞추기" title="반경에 맞추기">⌖</button>
        </div>
      </div>

      <div class="location-card">
        <div>
          <span class="label">현재 위치</span>
          <strong id="locationText">서울 성수동 기준 샘플</strong>
        </div>
        <span id="visibleCount">0명</span>
      </div>
    </section>

    <aside class="side-pane" aria-label="러너 프로필">
      <section class="panel leaderboard-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Weekly</p>
            <h2>이번 주 경쟁</h2>
          </div>
          <span id="radiusLabel">1 km</span>
        </div>
        <div class="stats-grid">
          <div>
            <span>참여</span>
            <strong id="statRunners">0</strong>
          </div>
          <div>
            <span>평균 페이스</span>
            <strong id="statPace">0'00"</strong>
          </div>
          <div>
            <span>총 거리</span>
            <strong id="statDistance">0 km</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Nearby</p>
            <h2>주변 러너</h2>
          </div>
          <div class="runner-actions">
            <button class="text-button" id="refreshRunnersButton" type="button" aria-label="다른 러너 보기">새로고침</button>
            <button class="text-button" id="sortButton" type="button">거리순</button>
          </div>
        </div>
        <div class="runner-list" id="runnerList"></div>
      </section>

      <section class="panel map-settings">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Map</p>
            <h2>지도 보기</h2>
          </div>
        </div>
        <div class="map-type-control" role="group" aria-label="지도 유형 선택">
          <button class="map-type-option is-active" type="button" data-map-style="mapbox://styles/mapbox/streets-v12">거리</button>
          <button class="map-type-option" type="button" data-map-style="mapbox://styles/mapbox/outdoors-v12">아웃도어</button>
          <button class="map-type-option" type="button" data-map-style="mapbox://styles/mapbox/satellite-streets-v12">위성</button>
        </div>
      </section>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
